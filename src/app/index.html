<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPQRST Pain Assessment</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; display: flex; flex-direction: column; height: 80vh; }
        .header { background: #1a73e8; color: white; padding: 20px; border-radius: 12px 12px 0 0; }
        .header h1 { font-size: 1.2rem; }
        .header p { font-size: 0.8rem; opacity: 0.8; margin-top: 4px; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; }
        .bot { background: #f0f4f8; align-self: flex-start; border-radius: 4px 12px 12px 12px; }
        .user { background: #1a73e8; color: white; align-self: flex-end; border-radius: 12px 4px 12px 12px; }
        .summary { background: #e8f5e9; border-left: 4px solid #4caf50; padding: 16px; border-radius: 8px; align-self: stretch; white-space: pre-wrap; }
        .input-area { padding: 16px; border-top: 1px solid #eee; display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; }
        input:focus { border-color: #1a73e8; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 OPQRST Pain Assessment</h1>
            <p>This tool provides general information only and is not medical advice.</p>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Type your answer..." onkeydown="if(event.key==='Enter') sendMessage()" />
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const sessionId = Math.random().toString(36).slice(2);
        const messages = document.getElementById("messages");
        const input = document.getElementById("input");
        const sendBtn = document.getElementById("sendBtn");

        function addMessage(text, type) {
            const div = document.createElement("div");
            div.className = `message ${type}`;
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        async function start() {
            const res = await fetch(`/start?session_id=${sessionId}`);
            const data = await res.json();
            addMessage(data.message, "bot");
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            input.value = "";
            addMessage(text, "user");
            sendBtn.disabled = true;

            const res = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({session_id: sessionId, message: text})
            });
            const data = await res.json();

            if (data.complete) {
                const div = document.createElement("div");
                div.className = "message summary";
                div.textContent = data.message;
                messages.appendChild(div);
                messages.scrollTop = messages.scrollHeight;
                input.disabled = true;
                sendBtn.disabled = true;
            } else {
                addMessage(data.message, "bot");
                sendBtn.disabled = false;
                input.focus();
            }
        }

        start();
    </script>
</body>
</html>
